<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.1" />
    </linearGradient>

    <radialGradient id="glowGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0" />
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGradient)" />

  <!-- Grid Pattern -->
  <rect width="1200" height="800" fill="url(#grid)" />

  <!-- Accent gradient overlay -->
  <rect width="1200" height="800" fill="url(#accentGradient)" opacity="0.4" />

  <!-- Top-left corner accent -->
  <circle cx="100" cy="100" r="250" fill="url(#glowGradient)" opacity="0.6" />

  <!-- Bottom-right corner accent -->
  <circle cx="1100" cy="700" r="300" fill="url(#glowGradient)" opacity="0.4" />

  <!-- Floating geometric shapes -->
  <g opacity="0.08">
    <!-- Top-left lines -->
    <line x1="150" y1="50" x2="250" y2="150" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" />
    <line x1="200" y1="80" x2="280" y2="160" stroke="#0ea5e9" stroke-width="1" stroke-linecap="round" />
    <line x1="100" y1="120" x2="200" y2="200" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" />

    <!-- Mid-left accent -->
    <line x1="50" y1="350" x2="200" y2="450" stroke="#0284c7" stroke-width="2" stroke-linecap="round" />
    <line x1="80" y1="380" x2="220" y2="480" stroke="#0284c7" stroke-width="1" stroke-linecap="round" />

    <!-- Bottom-right lines -->
    <line x1="950" y1="600" x2="1100" y2="750" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" />
    <line x1="920" y1="630" x2="1080" y2="780" stroke="#0ea5e9" stroke-width="1" stroke-linecap="round" />
    <line x1="1000" y1="650" x2="1150" y2="800" stroke="#0284c7" stroke-width="1.5" stroke-linecap="round" />

    <!-- Mid-right accent -->
    <line x1="1150" y1="200" x2="1000" y2="350" stroke="#0284c7" stroke-width="2" stroke-linecap="round" />
    <line x1="1120" y1="230" x2="980" y2="380" stroke="#0284c7" stroke-width="1" stroke-linecap="round" />
  </g>

  <!-- Subtle code-like elements -->
  <g opacity="0.05" font-family="monospace" font-size="12" fill="#0ea5e9">
    <text x="80" y="650" font-weight="bold">{"const"}</text>
    <text x="80" y="675">buildSomething()</text>

    <text x="1020" y="120">function()</text>
    <text x="1020" y="145" font-weight="bold">{"return"}</text>
  </g>

  <!-- Corner dots (accent points) -->
  <g fill="#0ea5e9" opacity="0.12">
    <circle cx="100" cy="50" r="3" />
    <circle cx="150" cy="100" r="2" />
    <circle cx="1100" cy="750" r="3" />
    <circle cx="1050" cy="700" r="2" />
    <circle cx="50" cy="400" r="2.5" />
  </g>

  <!-- Subtle horizontal accent lines -->
  <g stroke="#0ea5e9" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="400" x2="1200" y2="400" />
    <line x1="0" y1="600" x2="1200" y2="600" />
  </g>
</svg>