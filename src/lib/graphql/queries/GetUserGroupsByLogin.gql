query GetUserGroupsByLogin($userLogin: String, $offset: Int, $limit: Int, $accepted: Boolean) {
	group_user(
		where: { userLogin: { _eq: $userLogin }, accepted: { _eq: $accepted } }
		offset: $offset
		limit: $limit
		order_by: [{ group: { updatedAt: desc } }, { id: desc }]
	) {
		...UserGroupFields
	}
}
